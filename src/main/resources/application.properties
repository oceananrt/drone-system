# ==================== 数据库 ====================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==================== 无人机协议选择 ====================
# 可选值：custom / mavlink / dji
# custom:  自定义二进制协议（默认），串口 115200/8N1，需飞控端按协议格式通信
# mavlink: MAVLink v1 协议，需 Pixhawk/ArduPilot 飞控 + 数传电台
# dji:     DJI Cloud API，需 DJI 无人机 + Cloud API Server
drone.protocol.type=custom

# ==================== MAVLink 协议配置 ====================
# 串口名（留空则自动搜索）
drone.mavlink.port=
# 波特率（Pixhawk 默认 57600）
drone.mavlink.baud=57600
# 本机系统 ID（地面站通常用 255）
drone.mavlink.system-id=255
# 本机组件 ID（190 = MAV_COMP_ID_MISSIONPLANNER）
drone.mavlink.component-id=190

# ==================== DJI Cloud API 配置 ====================
# DJI Cloud API Server 地址
drone.dji.server-url=http://127.0.0.1:8900
# 应用 ID（从 DJI 开发者平台获取）
drone.dji.app-id=your_app_id
# 应用密钥（从 DJI 开发者平台获取）
drone.dji.app-secret=your_app_secret
